name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Groq API key
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import os, sys
          key = os.environ.get('GROQ_API_KEY', '')
          if not key:
              print('ERROR: GROQ_API_KEY secret is empty')
              sys.exit(1)
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()
          if 'YOUR_GROQ_API_KEY' not in content:
              print('ERROR: placeholder YOUR_GROQ_API_KEY not found in index.html')
              sys.exit(1)
          content = content.replace('YOUR_GROQ_API_KEY', key)
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          print('OK: key injected successfully')
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
