name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:         # ручной запуск из Actions-вкладки

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Groq API key
        # Заменяет плейсхолдер на реальный ключ из секретов репозитория.
        # Ключ не попадает в git-историю — только в собранный артефакт Pages.
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: sed -i "s/YOUR_GROQ_API_KEY/${GROQ_API_KEY}/g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
