<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Трекер проектов</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
<div id="root"></div>

<!-- Firebase (compat SDK — проще для одного файла без сборки) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

// =====================================================================
// НАСТРОЙКА FIREBASE
// Замени значения ниже на конфиг своего проекта из Firebase Console:
// Project settings (шестерёнка) → General → Your apps → веб-приложение
// =====================================================================
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
};
// =====================================================================

const DB_PATH = "projectTracker";
const isConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY";

let db = null;
if (isConfigured) {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
}

const STAGES = [
  { id: 'mockups', label: 'Макеты', role: 'я' },
  { id: 'landings', label: 'Лендинги', role: 'я / разработчик' },
  { id: 'bzrb', label: 'БЗРБ', role: 'я' },
  { id: 'applications', label: 'Заявки', role: 'я' },
  { id: 'kusy', label: 'Кусы', role: 'аналитик' },
  { id: 'test_rollout', label: 'Выкат тестовый', role: 'саппорт', optional: true, note: 'если делаем — нужны доп. заявки' },
  { id: 'rollout', label: 'Выкат', role: 'саппорт' },
  { id: 'calculate', label: 'Посчитать', role: 'аналитик' },
  { id: 'presentation', label: 'Презентация', role: 'я' },
  { id: 'remove', label: 'Удалить', role: 'саппорт' },
];

const ROLE_STYLES = {
  'я': 'bg-indigo-50 text-indigo-700 ring-1 ring-inset ring-indigo-200',
  'я / разработчик': 'bg-violet-50 text-violet-700 ring-1 ring-inset ring-violet-200',
  'аналитик': 'bg-teal-50 text-teal-700 ring-1 ring-inset ring-teal-200',
  'саппорт': 'bg-amber-50 text-amber-700 ring-1 ring-inset ring-amber-200',
};

const DEFAULT_PROJECTS = [
  { id: 'p1', number: '1', name: 'Умная камера. Профайлер', category: null },
  { id: 'p2', number: '2', name: 'ИИ-рекрутер', category: null },
  { id: 'p3', number: '3', name: 'ИИ-сервисы', category: null },
  { id: 'p4_0', number: '4.0', name: 'Страховка. Формулировка', category: 'Макеты дизайн-экспа' },
  { id: 'p4_1', number: '4.1', name: 'Эластичность спроса', category: 'Макеты дизайн-экспа' },
  { id: 'p4_2', number: '4.2', name: 'Страховка. Лендинг', category: 'Макеты дизайн-экспа' },
  { id: 'p4_3', number: '4.3', name: 'Страховка. Тарифы', category: 'Макеты дизайн-экспа' },
  { id: 'p5', number: '5', name: 'Двойное прикладывание комбо-счёта', category: null },
];

function makeProject(p) {
  return { ...p, stages: {}, notes: '' };
}

// --- иконки (инлайн SVG, без внешних пакетов) ---
const IconChevronDown = (p) => (
  <svg className={p.className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
);
const IconChevronRight = (p) => (
  <svg className={p.className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
);
const IconPlus = (p) => (
  <svg className={p.className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
);
const IconTrash = (p) => (
  <svg className={p.className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
);
const IconX = (p) => (
  <svg className={p.className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
);

function ProjectTracker() {
  const [projects, setProjects] = React.useState(null);
  const [expanded, setExpanded] = React.useState({});
  const [showAdd, setShowAdd] = React.useState(false);
  const [newName, setNewName] = React.useState('');
  const [newCategory, setNewCategory] = React.useState('');
  const [connStatus, setConnStatus] = React.useState('connecting'); // connecting | ok | error

  React.useEffect(() => {
    let dbRef = null;
    let listener = null;

    const attachListener = () => {
      dbRef = db.ref(DB_PATH);
      listener = (snapshot) => {
        const data = snapshot.val();
        setConnStatus('ok');
        if (data && Array.isArray(data) && data.length > 0) {
          setProjects(data);
          setExpanded(prev => Object.keys(prev).length ? prev : { [data[0].id]: true });
        } else if (data === null) {
          const initial = DEFAULT_PROJECTS.map(makeProject);
          dbRef.set(initial);
        }
      };
      dbRef.on('value', listener, () => setConnStatus('error'));
    };

    const unsubscribe = firebase.auth().onAuthStateChanged((user) => {
      if (user) {
        attachListener();
      } else {
        firebase.auth().signInAnonymously().catch(() => setConnStatus('error'));
      }
    });

    return () => {
      unsubscribe();
      if (dbRef && listener) dbRef.off('value', listener);
    };
  }, []);

  if (projects === null) {
    return (
      <div className="flex items-center justify-center h-64 text-slate-400 text-sm">
        {connStatus === 'error'
          ? 'Не удалось подключиться к базе данных. Проверь firebaseConfig и правила доступа.'
          : 'Загрузка...'}
      </div>
    );
  }

  const updateProjects = (updater) => {
    setProjects(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      db.ref(DB_PATH).set(next).catch(() => setConnStatus('error'));
      return next;
    });
  };

  const toggleStage = (projectId, stageId) => {
    updateProjects(prev => prev.map(p =>
      p.id === projectId
        ? { ...p, stages: { ...p.stages, [stageId]: !p.stages[stageId] } }
        : p
    ));
  };

  const toggleExpand = (id) => {
    setExpanded(prev => ({ ...prev, [id]: !prev[id] }));
  };

  const updateNotes = (id, value) => {
    updateProjects(prev => prev.map(p => p.id === id ? { ...p, notes: value } : p));
  };

  const deleteProject = (id) => {
    updateProjects(prev => prev.filter(p => p.id !== id));
  };

  const addProject = () => {
    const name = newName.trim();
    if (!name) return;
    const nums = projects.map(p => parseInt(p.number, 10)).filter(n => !isNaN(n));
    const nextNum = nums.length ? Math.max(...nums) + 1 : 1;
    const id = `p${Date.now()}`;
    const newProject = makeProject({ id, number: String(nextNum), name, category: newCategory.trim() || null });
    updateProjects(prev => [...prev, newProject]);
    setExpanded(prev => ({ ...prev, [id]: true }));
    setNewName('');
    setNewCategory('');
    setShowAdd(false);
  };

  const progressOf = (p) => {
    const done = STAGES.filter(s => p.stages[s.id]).length;
    return { done, total: STAGES.length, pct: Math.round((done / STAGES.length) * 100) };
  };

  const totalDone = projects.reduce((acc, p) => acc + progressOf(p).done, 0);
  const totalPossible = projects.length * STAGES.length;
  const completedProjects = projects.filter(p => progressOf(p).done === STAGES.length).length;

  return (
    <div className="max-w-3xl mx-auto p-4 sm:p-6 font-sans">
      <header className="mb-6">
        <div className="flex items-center justify-between gap-3">
          <h1 className="text-2xl font-semibold text-slate-900 tracking-tight">Трекер проектов</h1>
          <span className="inline-flex items-center gap-1.5 text-xs text-slate-400">
            <span className={`w-2 h-2 rounded-full ${connStatus === 'ok' ? 'bg-emerald-400' : connStatus === 'error' ? 'bg-rose-400' : 'bg-slate-300'}`} />
            {connStatus === 'ok' ? 'синхронизация активна' : connStatus === 'error' ? 'ошибка соединения' : 'подключение...'}
          </span>
        </div>
        <p className="mt-1 text-sm text-slate-500">
          Чек-лист подготовки эксперимента перед выкатом. Длительность эксперимента — от недели до 2 месяцев.
        </p>
        <div className="mt-4 flex flex-wrap gap-3 text-sm">
          <div className="rounded-lg bg-white ring-1 ring-slate-200 px-3 py-2">
            <div className="text-slate-400 text-xs uppercase tracking-wide">Проектов</div>
            <div className="text-lg font-semibold text-slate-900 tabular-nums">{projects.length}</div>
          </div>
          <div className="rounded-lg bg-white ring-1 ring-slate-200 px-3 py-2">
            <div className="text-slate-400 text-xs uppercase tracking-wide">Готово полностью</div>
            <div className="text-lg font-semibold text-slate-900 tabular-nums">{completedProjects}</div>
          </div>
          <div className="rounded-lg bg-white ring-1 ring-slate-200 px-3 py-2">
            <div className="text-slate-400 text-xs uppercase tracking-wide">Этапов выполнено</div>
            <div className="text-lg font-semibold text-slate-900 tabular-nums">{totalDone} / {totalPossible}</div>
          </div>
        </div>
      </header>

      <div className="space-y-3">
        {projects.map(p => {
          const { done, total, pct } = progressOf(p);
          const isOpen = !!expanded[p.id];
          return (
            <div key={p.id} className="rounded-xl bg-white ring-1 ring-slate-200 overflow-hidden">
              <button
                onClick={() => toggleExpand(p.id)}
                className="w-full flex items-center gap-3 px-4 py-3 text-left hover:bg-slate-50 transition-colors"
              >
                {isOpen ? <IconChevronDown className="w-4 h-4 text-slate-400 shrink-0" /> : <IconChevronRight className="w-4 h-4 text-slate-400 shrink-0" />}
                <span className="shrink-0 text-xs font-mono font-medium text-slate-500 bg-slate-100 rounded px-1.5 py-0.5">
                  {p.number}
                </span>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="font-medium text-slate-900 truncate">{p.name}</span>
                    {p.category && (
                      <span className="text-xs text-slate-400 bg-slate-50 ring-1 ring-slate-200 rounded px-1.5 py-0.5 shrink-0">
                        {p.category}
                      </span>
                    )}
                  </div>
                  <div className="mt-1.5 flex items-center gap-2">
                    <div className="h-1.5 flex-1 max-w-[160px] bg-slate-100 rounded-full overflow-hidden">
                      <div
                        className="h-full bg-indigo-500 rounded-full transition-all"
                        style={{ width: `${pct}%` }}
                      />
                    </div>
                    <span className="text-xs text-slate-400 tabular-nums">{done}/{total}</span>
                  </div>
                </div>
              </button>

              {isOpen && (
                <div className="px-4 pb-4 pt-1 border-t border-slate-100">
                  <ul className="divide-y divide-slate-100">
                    {STAGES.map(stage => {
                      const checked = !!p.stages[stage.id];
                      return (
                        <li key={stage.id} className="flex items-center gap-3 py-2">
                          <button
                            onClick={() => toggleStage(p.id, stage.id)}
                            className={`shrink-0 w-5 h-5 rounded-md ring-1 ring-inset flex items-center justify-center transition-colors ${
                              checked ? 'bg-indigo-500 ring-indigo-500' : 'bg-white ring-slate-300 hover:ring-slate-400'
                            }`}
                            aria-label={checked ? `Снять отметку «${stage.label}»` : `Отметить «${stage.label}» выполненным`}
                          >
                            {checked && (
                              <svg viewBox="0 0 16 16" className="w-3.5 h-3.5 fill-none stroke-white" strokeWidth="2.5">
                                <path d="M3.5 8.5L6.5 11.5L12.5 4.5" strokeLinecap="round" strokeLinejoin="round" />
                              </svg>
                            )}
                          </button>
                          <span className={`flex-1 text-sm ${checked ? 'text-slate-400 line-through' : 'text-slate-700'}`}>
                            {stage.label}
                            {stage.optional && (
                              <span className="ml-1.5 text-xs text-slate-400 font-normal">
                                (опционально{stage.note ? ` — ${stage.note}` : ''})
                              </span>
                            )}
                          </span>
                          <span className={`text-xs font-medium rounded-full px-2 py-0.5 shrink-0 ${ROLE_STYLES[stage.role]}`}>
                            {stage.role}
                          </span>
                        </li>
                      );
                    })}
                  </ul>

                  <textarea
                    value={p.notes}
                    onChange={(e) => updateNotes(p.id, e.target.value)}
                    placeholder="Заметки по проекту..."
                    rows={2}
                    className="mt-3 w-full text-sm rounded-lg border border-slate-200 px-3 py-2 text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 resize-none"
                  />

                  <div className="mt-2 flex justify-end">
                    <button
                      onClick={() => deleteProject(p.id)}
                      className="inline-flex items-center gap-1 text-xs text-slate-400 hover:text-rose-500 transition-colors"
                    >
                      <IconTrash className="w-3.5 h-3.5" />
                      Удалить проект
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div className="mt-4">
        {showAdd ? (
          <div className="rounded-xl bg-white ring-1 ring-slate-200 p-4 space-y-3">
            <div className="flex items-center justify-between">
              <span className="text-sm font-medium text-slate-900">Новый проект</span>
              <button onClick={() => setShowAdd(false)} className="text-slate-400 hover:text-slate-600">
                <IconX className="w-4 h-4" />
              </button>
            </div>
            <input
              value={newName}
              onChange={(e) => setNewName(e.target.value)}
              placeholder="Название проекта"
              className="w-full text-sm rounded-lg border border-slate-200 px-3 py-2 text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300"
              autoFocus
            />
            <input
              value={newCategory}
              onChange={(e) => setNewCategory(e.target.value)}
              placeholder="Категория (необязательно)"
              className="w-full text-sm rounded-lg border border-slate-200 px-3 py-2 text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300"
            />
            <button
              onClick={addProject}
              disabled={!newName.trim()}
              className="w-full text-sm font-medium rounded-lg bg-indigo-500 text-white py-2 hover:bg-indigo-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
            >
              Добавить
            </button>
          </div>
        ) : (
          <button
            onClick={() => setShowAdd(true)}
            className="w-full flex items-center justify-center gap-1.5 rounded-xl ring-1 ring-dashed ring-slate-300 text-sm text-slate-400 hover:text-slate-600 hover:ring-slate-400 py-3 transition-colors"
          >
            <IconPlus className="w-4 h-4" />
            Добавить проект
          </button>
        )}
      </div>
    </div>
  );
}

function SetupInstructions() {
  const ruleSnippet = `{\n  "rules": {\n    ".read": "auth != null",\n    ".write": "auth != null"\n  }\n}`;
  const configSnippet = `const firebaseConfig = {\n  apiKey: "...",\n  authDomain: "....firebaseapp.com",\n  databaseURL: "https://...-default-rtdb.firebaseio.com",\n  projectId: "...",\n};`;

  return (
    <div className="max-w-2xl mx-auto p-6 font-sans">
      <h1 className="text-2xl font-semibold text-slate-900 tracking-tight">Настройка Firebase</h1>
      <p className="mt-2 text-sm text-slate-500">
        Трекер использует Firebase Realtime Database, чтобы все участники видели одни и те же данные в реальном времени.
        Нужно один раз создать бесплатный проект и вставить его конфиг в этот файл.
      </p>

      <ol className="mt-6 space-y-5 text-sm text-slate-700">
        <li className="rounded-xl bg-white ring-1 ring-slate-200 p-4">
          <div className="font-medium text-slate-900 mb-1">1. Создай проект Firebase</div>
          Зайди на <code className="bg-slate-100 px-1 rounded">console.firebase.google.com</code>, нажми «Add project»,
          дай любое имя. Биллинг не нужен — Realtime Database на бесплатном плане Spark достаточно.
        </li>

        <li className="rounded-xl bg-white ring-1 ring-slate-200 p-4">
          <div className="font-medium text-slate-900 mb-1">2. Включи Realtime Database</div>
          В меню слева: Build → Realtime Database → Create Database. Выбери регион, режим (locked/test — не важно, правила переопределим на шаге 3).
        </li>

        <li className="rounded-xl bg-white ring-1 ring-slate-200 p-4">
          <div className="font-medium text-slate-900 mb-1">3. Включи анонимную авторизацию</div>
          В меню слева: Build → Authentication → Get started → вкладка «Sign-in method» → добавь провайдер
          «Anonymous» → Enable → Save. Пользователи не увидят никакой формы логина — авторизация происходит
          в фоне при открытии страницы, это просто способ отличить «клиент через наше приложение» от случайного бота.
        </li>

        <li className="rounded-xl bg-white ring-1 ring-slate-200 p-4">
          <div className="font-medium text-slate-900 mb-1">4. Закрой доступ для неавторизованных</div>
          Вкладка «Rules» в Realtime Database — замени содержимое на:
          <pre className="mt-2 bg-slate-900 text-slate-100 text-xs rounded-lg p-3 overflow-x-auto">{ruleSnippet}</pre>
          <p className="mt-2 text-xs text-slate-500">
            Теперь читать и писать может только клиент, прошедший анонимную авторизацию (шаг 3) — это отсекает
            автоматические сканеры открытых Firebase-баз. Полной защиты это не даёт (конфиг всё равно публичный,
            и кто-то технически продвинутый может тоже залогиниться анонимно), но для случайного доступа и ботов
            это серьёзный барьер. Не храни здесь ничего по-настоящему чувствительного.
          </p>
        </li>


        <li className="rounded-xl bg-white ring-1 ring-slate-200 p-4">
          <div className="font-medium text-slate-900 mb-1">5. Получи конфиг веб-приложения</div>
          Project settings (шестерёнка рядом с «Project Overview») → вкладка General → «Your apps» → иконка «&lt;/&gt;» (Web) →
          зарегистрируй приложение (хостинг Firebase не нужен) → скопируй объект <code className="bg-slate-100 px-1 rounded">firebaseConfig</code>.
        </li>

        <li className="rounded-xl bg-white ring-1 ring-slate-200 p-4">
          <div className="font-medium text-slate-900 mb-1">6. Вставь конфиг в файл</div>
          В начале <code className="bg-slate-100 px-1 rounded">index.html</code> замени блок:
          <pre className="mt-2 bg-slate-900 text-slate-100 text-xs rounded-lg p-3 overflow-x-auto">{configSnippet}</pre>
          на свои значения и сохрани файл — страница перезагрузится с рабочим трекером.
        </li>

        <li className="rounded-xl bg-white ring-1 ring-slate-200 p-4">
          <div className="font-medium text-slate-900 mb-1">7. Выложи на GitHub Pages</div>
          Создай репозиторий → загрузи этот <code className="bg-slate-100 px-1 rounded">index.html</code> (Add file → Upload files) →
          Settings → Pages → Source: Deploy from a branch → branch <code className="bg-slate-100 px-1 rounded">main</code>, папка
          <code className="bg-slate-100 px-1 rounded"> / (root)</code> → Save. Через минуту страница будет доступна по адресу вида
          <code className="bg-slate-100 px-1 rounded"> username.github.io/repo-name</code>.
        </li>
      </ol>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(isConfigured ? <ProjectTracker /> : <SetupInstructions />);

</script>
</body>
</html>
